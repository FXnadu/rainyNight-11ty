<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音商品链接批量转换工具 (最终修复版)</title>
    <style>
        /* 全局样式和字体设置 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
            background-color: #ffffff;
        }
        /* 容器和卡片样式 */
        .container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #000;
            margin-bottom: 20px;
        }
        p {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }
        /* 输入框样式 */
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #000;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 15px;
            background-color: #fff;
            color: #000;
        }
        /* 控制按钮区域 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        /* 按钮通用样式 */
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: white;
            transition: background-color 0.3s ease;
        }
        /* 转换按钮样式 */
        #convert-btn {
            background-color: #000;
        }
        #convert-btn:hover {
            background-color: #333;
        }
        #convert-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        /* 清空按钮样式 */
        #clear-btn {
            background-color: #666;
        }
        #clear-btn:hover {
            background-color: #333;
        }
        /* 状态显示区域 */
        #status {
            text-align: center;
            font-weight: bold;
            color: #333;
            min-height: 24px;
            margin-bottom: 15px;
        }
        /* 结果显示区域 */
        #results-container {
            background-color: #fff;
            border: 1px solid #000;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .result-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #000;
        }
        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .original-command {
            font-size: 12px;
            color: #666;
            display: -webkit-box;
            -webkit-line-clamp: 1; /* 只显示一行 */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }
        .final-link {
            font-weight: bold;
            color: #000;
            word-break: break-all;
        }
        .final-link:hover {
            color: #666;
        }
        .error-link {
            font-weight: bold;
            color: #333;
        }
        .error-suggestion {
            font-size: 12px;
            color: #333;
            background-color: #f0f0f0;
            border: 1px solid #000;
            padding: 5px;
            border-radius: 4px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>抖音商品链接批量转换工具 (最终修复版)</h1>
        <p>支持识别【抖音口令】和【带alkey的长链接】两种格式。</p>
        
        <textarea id="commands-input" placeholder="请在这里粘贴【抖音口令】或【带alkey参数的长链接】，每条占一行..."></textarea>
        
        <div class="controls">
            <button id="convert-btn">🚀 智能转换</button>
            <button id="clear-btn">🧹 清空内容</button>
        </div>

        <div id="status"></div>
        
        <div id="results-container">
            <p style="text-align:center; color:#999;">转换结果将显示在这里...</p>
        </div>
    </div>

    <script>
        // --- 配置区域 ---
        // 注意：公共代理服务不稳定，可能随时被抖音屏蔽。这是纯前端方案的固有局限。
        // 如果自动转换持续失败，请考虑使用更可靠的“私人代理”方案。
        const CORS_PROXY = 'https://api.allorigins.win/get?url=';

        // --- DOM元素绑定 ---
        const convertBtn = document.getElementById('convert-btn');
        const clearBtn = document.getElementById('clear-btn');
        const commandsInput = document.getElementById('commands-input');
        const statusEl = document.getElementById('status');
        const resultsContainer = document.getElementById('results-container');

        // --- 事件监听 ---
        convertBtn.addEventListener('click', handleBatchConvert);
        clearBtn.addEventListener('click', () => {
            commandsInput.value = '';
            resultsContainer.innerHTML = '<p style="text-align:center; color:#999;">转换结果将显示在这里...</p>';
            statusEl.textContent = '';
        });
        
        /**
         * 核心解析函数：从任何包含alkey的URL中提取ID并构建最终链接
         * @param {string} urlString - 包含alkey参数的URL
         * @returns {string} - 最终链接或错误信息
         */
        function parseAlkeyAndBuildUrl(urlString) {
            try {
                // 有些代理返回的URL可能包含在自己的参数里，先解码
                const decodedUrlString = decodeURIComponent(urlString);
                const url = new URL(decodedUrlString);
                const alkeyValue = url.searchParams.get('alkey');
                
                if (!alkeyValue) {
                    return '错误：链接中缺少 alkey 参数。<div class="error-suggestion">提示：请尝试在浏览器新标签页中打开口令里的短链接，然后将跳转后的完整网址粘贴回来进行转换。</div>';
                }

                const alkeyParts = alkeyValue.split('_');
                if (alkeyParts.length < 4) {
                    return `错误：alkey 参数格式不正确 (${alkeyValue})。`;
                }
                const productId = alkeyParts[3];

                // 构建最终链接
                return `https://haohuo.jinritemai.com/ecommerce/trade/detail/index.html?id=${productId}&origin_type=604#/`;
            } catch (error) {
                return `错误：解析URL失败 (${error.message})。`;
            }
        }

        /**
         * 智能转换单条输入
         * @param {string} inputString - 用户输入的单行文本
         * @returns {Promise<string>} 最终链接或错误信息
         */
        async function convertSingleInput(inputString) {
            // 1. 直接处理带alkey的长链接
            if (inputString.includes('haohuo.jinritemai.com') && inputString.includes('alkey=')) {
                return parseAlkeyAndBuildUrl(inputString);
            }

            // 2. 处理包含v.douyin.com的口令
            const shortUrlMatch = inputString.match(/https?:\/\/v\.douyin\.com\/[^\s]+/);
            if (shortUrlMatch) {
                const shortUrl = shortUrlMatch[0];
                try {
                    // 通过代理访问短链接
                    const response = await fetch(CORS_PROXY + encodeURIComponent(shortUrl));
                    if (!response.ok) {
                        return `错误：访问短链接失败 (状态码: ${response.status})。`;
                    }
                    const data = await response.json();
                    
                    // 最终的URL在返回的JSON对象的 status.url 字段中
                    const intermediateUrl = data.status.url;

                    if (!intermediateUrl) {
                        return '错误：代理未能返回最终跳转链接。';
                    }
                    
                    // 使用核心函数解析获取到的最终链接
                    return parseAlkeyAndBuildUrl(intermediateUrl);
                } catch (error) {
                    return `错误：网络或代理请求失败 (${error.message})。`;
                }
            }
            
            // 3. 如果两种格式都不是
            return '错误：无法识别的格式。请输入抖音口令或带alkey参数的长链接。';
        }

        /**
         * 主处理函数，负责批量转换
         */
        async function handleBatchConvert() {
            const inputs = commandsInput.value.split('\n').filter(line => line.trim() !== '');
            if (inputs.length === 0) {
                statusEl.textContent = '请输入至少一条内容！';
                return;
            }

            resultsContainer.innerHTML = '';
            statusEl.textContent = '🚀 正在初始化...';
            convertBtn.disabled = true;

            for (let i = 0; i < inputs.length; i++) {
                const input = inputs[i];
                statusEl.textContent = `处理中... (${i + 1}/${inputs.length})`;
                const result = await convertSingleInput(input);
                displayResult(input, result);
            }
            
            statusEl.textContent = `✅ 处理完成！共 ${inputs.length} 条。`;
            convertBtn.disabled = false;
        }

        /**
         * 在页面上显示单条结果
         * @param {string} original - 原始输入
         * @param {string} result - 转换结果（链接或错误信息）
         */
        function displayResult(original, result) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'result-item';

            const originalP = document.createElement('div');
            originalP.className = 'original-command';
            originalP.textContent = `原始输入: ${original}`;
            
            const resultP = document.createElement('div');
            if (result && result.startsWith('http')) {
                resultP.innerHTML = `转换链接: <a href="${result}" target="_blank" class="final-link">${result}</a>`;
            } else {
                resultP.innerHTML = `转换结果: <span class="error-link">${result}</span>`;
            }
            
            itemDiv.appendChild(originalP);
            itemDiv.appendChild(resultP);
            resultsContainer.appendChild(itemDiv);
        }
    </script>
</body>
</html>
